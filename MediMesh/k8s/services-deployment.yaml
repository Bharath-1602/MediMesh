# ════════════════════════════════════════════════════════
# MediMesh — All Backend Service Deployments + ClusterIP
# ════════════════════════════════════════════════════════

# ─── Auth Service ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medimesh-auth
  namespace: medimesh
  labels:
    app: medimesh-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medimesh-auth
  template:
    metadata:
      labels:
        app: medimesh-auth
    spec:
      containers:
        - name: medimesh-auth
          image: medimesh-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGO_URI
              value: "mongodb://medimesh-mongodb:27017/medimesh-auth-db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: medimesh-auth-svc
  namespace: medimesh
spec:
  type: ClusterIP
  selector:
    app: medimesh-auth
  ports:
    - port: 5001
      targetPort: 5001

