# PersistentVolume for MongoDB (hostPath for kubeadm learning)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: medimesh-mongodb-pv
  labels:
    app: medimesh-mongodb
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/medimesh-mongodb
    type: DirectoryOrCreate
---
# PersistentVolumeClaim for MongoDB
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medimesh-mongodb-pvc
  namespace: medimesh
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: medimesh-mongodb
