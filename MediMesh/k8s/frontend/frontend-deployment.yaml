# ════════════════════════════════════════════════════════════
# MediMesh — Frontend Deployment + NodePort Service
# ════════════════════════════════════════════════════════════

# ─── Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medimesh-frontend
  namespace: medimesh
  labels:
    app: medimesh-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medimesh-frontend
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medimesh-frontend
        tier: frontend
    spec:
      containers:
        - name: medimesh-frontend
          image: bharath44623/medimesh_medimesh-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: BFF_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: BFF_SERVICE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# ─── NodePort Service (External Access on port 30080) ─────
apiVersion: v1
kind: Service
metadata:
  name: medimesh-frontend-svc
  namespace: medimesh
  labels:
    app: medimesh-frontend
    tier: frontend
spec:
  type: NodePort
  selector:
    app: medimesh-frontend
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
