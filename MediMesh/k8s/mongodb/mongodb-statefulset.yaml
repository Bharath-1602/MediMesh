# ════════════════════════════════════════════════════════════
# MediMesh — MongoDB StatefulSet + Headless Service
# ════════════════════════════════════════════════════════════

# ─── StatefulSet ──────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  serviceName: medimesh-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: medimesh-mongodb
      tier: database
  template:
    metadata:
      labels:
        app: medimesh-mongodb
        tier: database
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: medimesh-mongodb-pvc

---
# ─── Headless Service (for StatefulSet DNS) ───────────────
apiVersion: v1
kind: Service
metadata:
  name: medimesh-mongodb
  namespace: medimesh
  labels:
    app: medimesh-mongodb
    tier: database
spec:
  clusterIP: None
  selector:
    app: medimesh-mongodb
    tier: database
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo
