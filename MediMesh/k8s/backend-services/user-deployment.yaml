# ════════════════════════════════════════════════════════════
# MediMesh — User Service Deployment
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medimesh-user
  namespace: medimesh
  labels:
    app: medimesh-user
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medimesh-user
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: medimesh-user
        tier: backend
    spec:
      containers:
        - name: medimesh-user
          image: bharath44623/medimesh_medimesh-user:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
              name: http
          env:
            - name: PORT
              value: "5002"
            - name: MONGO_URI
              value: "mongodb://medimesh-mongodb:27017/medimesh-user-db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: NODE_ENV
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: DOCTOR_SERVICE_URL
            - name: AMBULANCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: AMBULANCE_SERVICE_URL
            - name: PHARMACY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: PHARMACY_SERVICE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
