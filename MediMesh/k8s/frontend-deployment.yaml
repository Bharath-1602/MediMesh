# Frontend Deployment + NodePort Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medimesh-frontend
  namespace: medimesh
  labels:
    app: medimesh-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medimesh-frontend
  template:
    metadata:
      labels:
        app: medimesh-frontend
    spec:
      containers:
        - name: medimesh-frontend
          image: medimesh-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
# NodePort Service — Exposes frontend on port 30080
apiVersion: v1
kind: Service
metadata:
  name: medimesh-frontend-svc
  namespace: medimesh
spec:
  type: NodePort
  selector:
    app: medimesh-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
