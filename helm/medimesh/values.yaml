

global:
  namespace: medimesh-helm
  environment: production
  imageRegistry: bharath44623
  imageTag: "v1.1.0"
  imagePullPolicy: Always

# ─── Namespace ─────────────────────────────────────────────
namespace:
  name: medimesh-helm
  labels:
    app: medimesh
    project: hospital-management
    environment: production

# ─── ConfigMap ─────────────────────────────────────────────
config:
  nodeEnv: "production"
  mongoHost: "medimesh-mongodb"
  mongoPort: "27017"
  serviceUrls:
    auth: "http://medimesh-auth-svc:5001"
    user: "http://medimesh-user-svc:5002"
    doctor: "http://medimesh-doctor-svc:5003"
    appointment: "http://medimesh-appointment-svc:5004"
    vitals: "http://medimesh-vitals-svc:5005"
    pharmacy: "http://medimesh-pharmacy-svc:5006"
    ambulance: "http://medimesh-ambulance-svc:5007"
    complaint: "http://medimesh-complaint-svc:5008"
    forum: "http://medimesh-forum-svc:5009"
    bff: "http://medimesh-bff-svc:5010"

# ─── Secrets (Base64 Encoded) ─────────────────────────────
secrets:
  jwtSecret: "bWVkaW1lc2gtand0LXNlY3JldC0yMDI0"
  adminUsername: "YWRtaW4="
  adminPassword: "cGFzc3dvcmQxMjM="
  mongoRootUsername: "bWVkaW1lc2hBZG1pbg=="
  mongoRootPassword: "bWVkaW1lc2hQYXNzMjAyNA=="

# ─── Frontend ─────────────────────────────────────────────
frontend:
  name: medimesh-frontend
  replicas: 2
  image:
    repository: bharath44623/medimesh_medimesh-frontend
    tag: "v2.1.0"
    pullPolicy: Always
  containerPort: 80
  service:
    name: medimesh-frontend-svc
    type: ClusterIP
    port: 80
    targetPort: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  sidecar:
    image: busybox:1.36
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
  readinessProbe:
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    path: /
    port: 80
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 3
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1

# ─── HPA (Frontend) ───────────────────────────────────────
hpa:
  enabled: true
  name: medimesh-frontend-hpa
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 60

# ─── BFF (Backend-For-Frontend) ───────────────────────────
bff:
  name: medimesh-bff
  replicas: 2
  image:
    repository: bharath44623/medimesh_medimesh-bff
    tag: "v1.1.0"
    pullPolicy: Always
  containerPort: 5010
  service:
    name: medimesh-bff-svc
    type: ClusterIP
    port: 5010
    targetPort: 5010
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  readinessProbe:
    path: /health
    port: 5010
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    path: /health
    port: 5010
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1

# ─── Backend Services ─────────────────────────────────────
# Common defaults for all backend microservices
backendDefaults:
  replicas: 2
  imagePullPolicy: Always
  initContainer:
    image: busybox:1.36
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
  strategy:
    type: RollingUpdate
    maxUnavailable: 1
    maxSurge: 1

# Individual backend services
backendServices:
  auth:
    name: medimesh-auth
    image:
      repository: bharath44623/medimesh_medimesh-auth
      tag: "v1.1.0"
    port: 5001
    dbName: medimesh-auth-db
    serviceName: medimesh-auth-svc
    extraEnv: []

  user:
    name: medimesh-user
    image:
      repository: bharath44623/medimesh_medimesh-user
      tag: "v1.1.0"
    port: 5002
    dbName: medimesh-user-db
    serviceName: medimesh-user-svc
    extraEnv:
      - name: DOCTOR_SERVICE_URL
        valueFrom:
          configMapKeyRef:
            name: medimesh-config
            key: DOCTOR_SERVICE_URL
      - name: AMBULANCE_SERVICE_URL
        valueFrom:
          configMapKeyRef:
            name: medimesh-config
            key: AMBULANCE_SERVICE_URL
      - name: PHARMACY_SERVICE_URL
        valueFrom:
          configMapKeyRef:
            name: medimesh-config
            key: PHARMACY_SERVICE_URL

  doctor:
    name: medimesh-doctor
    image:
      repository: bharath44623/medimesh_medimesh-doctor
      tag: "v1.1.0"
    port: 5003
    dbName: medimesh-doctor-db
    serviceName: medimesh-doctor-svc
    extraEnv: []

  appointment:
    name: medimesh-appointment
    image:
      repository: bharath44623/medimesh_medimesh-appointment
      tag: "v1.1.0"
    port: 5004
    dbName: medimesh-appointment-db
    serviceName: medimesh-appointment-svc
    extraEnv: []

  vitals:
    name: medimesh-vitals
    image:
      repository: bharath44623/medimesh_medimesh-vitals
      tag: "v1.1.0"
    port: 5005
    dbName: medimesh-vitals-db
    serviceName: medimesh-vitals-svc
    extraEnv: []

  pharmacy:
    name: medimesh-pharmacy
    image:
      repository: bharath44623/medimesh_medimesh-pharmacy
      tag: "v1.1.0"
    port: 5006
    dbName: medimesh-pharmacy-db
    serviceName: medimesh-pharmacy-svc
    extraEnv: []

  ambulance:
    name: medimesh-ambulance
    image:
      repository: bharath44623/medimesh_medimesh-ambulance
      tag: "v1.1.0"
    port: 5007
    dbName: medimesh-ambulance-db
    serviceName: medimesh-ambulance-svc
    extraEnv: []

  complaint:
    name: medimesh-complaint
    image:
      repository: bharath44623/medimesh_medimesh-complaint
      tag: "v1.1.0"
    port: 5008
    dbName: medimesh-complaint-db
    serviceName: medimesh-complaint-svc
    extraEnv: []

  forum:
    name: medimesh-forum
    image:
      repository: bharath44623/medimesh_medimesh-forum
      tag: "v1.1.0"
    port: 5009
    dbName: medimesh-forum-db
    serviceName: medimesh-forum-svc
    extraEnv: []

# ─── MongoDB ──────────────────────────────────────────────
mongodb:
  name: medimesh-mongodb
  replicas: 3
  image:
    repository: mongo
    tag: "7"
    pullPolicy: IfNotPresent
  containerPort: 27017
  replicaSetName: rs0-helm
  service:
    name: medimesh-mongodb
    port: 27017
    targetPort: 27017
  storage:
    storageClassName: nfs-dynamic-helm
    size: 5Gi
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  rsInitJob:
    name: mongodb-rs-init-helm
    backoffLimit: 5
    activeDeadlineSeconds: 300
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

# ─── NFS Provisioner ──────────────────────────────────────
nfs:
  enabled: true
  provisioner:
    name: nfs-client-provisioner-helm
    image:
      repository: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner
      tag: "v4.0.2"
      pullPolicy: IfNotPresent
    provisionerName: medimesh-helm/nfs-subdir-external-provisioner
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
  server:
    # ⚠️  REPLACE with your NFS server's PRIVATE IP
    ip: "<NFS_SERVER_PRIVATE_IP>"
    path: "/srv/nfs/medimesh-helm"
  storageClass:
    name: nfs-dynamic-helm
    isDefault: false
    onDelete: retain
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    pathPattern: "${.PVC.namespace}-${.PVC.name}"

# ─── Gateway (kGateway) ───────────────────────────────────
gateway:
  enabled: true
  name: medimesh-helm-gateway
  className: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  httpRoute:
    name: medimesh-helm-routes
