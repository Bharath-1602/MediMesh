# ════════════════════════════════════════════════════════════
# MediMesh — kGateway (Gateway + HTTPRoute)
# ════════════════════════════════════════════════════════════
# Gateway API-based routing for all MediMesh microservices.
# kGateway controller must be installed before applying this.
# ════════════════════════════════════════════════════════════
{{- if .Values.gateway.enabled }}

# ─── Gateway ─────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
  {{- range .Values.gateway.listeners }}
  - name: {{ .name }}
    protocol: {{ .protocol }}
    port: {{ .port }}
    allowedRoutes:
      namespaces:
        from: Same
  {{- end }}

---
# ─── HTTPRoute — All Microservice Routes ─────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway.httpRoute.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}

  rules:
  # ─── BFF Gateway (/api) ──────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: {{ .Values.bff.service.name }}
      port: {{ .Values.bff.service.port }}

  # ─── Auth Service (/auth) ────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /auth
    backendRefs:
    - name: {{ .Values.backendServices.auth.serviceName }}
      port: {{ .Values.backendServices.auth.port }}

  # ─── User Service (/user) ────────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /user
    backendRefs:
    - name: {{ .Values.backendServices.user.serviceName }}
      port: {{ .Values.backendServices.user.port }}

  # ─── Doctor Service (/doctor) ────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /doctor
    backendRefs:
    - name: {{ .Values.backendServices.doctor.serviceName }}
      port: {{ .Values.backendServices.doctor.port }}

  # ─── Appointment Service (/appointment) ──────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /appointment
    backendRefs:
    - name: {{ .Values.backendServices.appointment.serviceName }}
      port: {{ .Values.backendServices.appointment.port }}

  # ─── Vitals Service (/vitals) ────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /vitals
    backendRefs:
    - name: {{ .Values.backendServices.vitals.serviceName }}
      port: {{ .Values.backendServices.vitals.port }}

  # ─── Pharmacy Service (/pharmacy) ────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /pharmacy
    backendRefs:
    - name: {{ .Values.backendServices.pharmacy.serviceName }}
      port: {{ .Values.backendServices.pharmacy.port }}

  # ─── Ambulance Service (/ambulance) ──────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /ambulance
    backendRefs:
    - name: {{ .Values.backendServices.ambulance.serviceName }}
      port: {{ .Values.backendServices.ambulance.port }}

  # ─── Complaint Service (/complaint) ──────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /complaint
    backendRefs:
    - name: {{ .Values.backendServices.complaint.serviceName }}
      port: {{ .Values.backendServices.complaint.port }}

  # ─── Forum Service (/forum) ──────────────────────────────
  - matches:
    - path:
        type: PathPrefix
        value: /forum
    backendRefs:
    - name: {{ .Values.backendServices.forum.serviceName }}
      port: {{ .Values.backendServices.forum.port }}

  # ─── Frontend (catch-all /) ──────────────────────────────
  # MUST be LAST so specific paths above match first
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.frontend.service.name }}
      port: {{ .Values.frontend.service.port }}

{{- end }}
