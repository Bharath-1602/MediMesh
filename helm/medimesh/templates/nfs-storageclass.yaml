# ════════════════════════════════════════════════════════════
# MediMesh — NFS StorageClass (Dynamic Provisioning)
# ════════════════════════════════════════════════════════════
{{- if .Values.nfs.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.nfs.storageClass.name }}
  labels:
    app: medimesh
    tier: storage
  annotations:
    storageclass.kubernetes.io/is-default-class: {{ .Values.nfs.storageClass.isDefault | quote }}
provisioner: {{ .Values.nfs.provisioner.provisionerName }}
parameters:
  onDelete: {{ .Values.nfs.storageClass.onDelete }}
  pathPattern: {{ .Values.nfs.storageClass.pathPattern | quote }}
reclaimPolicy: {{ .Values.nfs.storageClass.reclaimPolicy }}
volumeBindingMode: {{ .Values.nfs.storageClass.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.nfs.storageClass.allowVolumeExpansion }}
{{- end }}
