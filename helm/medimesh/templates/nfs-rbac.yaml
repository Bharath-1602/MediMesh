
{{- if .Values.nfs.enabled }}

# ─── ServiceAccount ───────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.nfs.provisioner.name }}
  namespace: {{ .Values.namespace.name }}

---
# ─── ClusterRole ──────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.nfs.provisioner.name }}-runner
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]

---
# ─── ClusterRoleBinding ──────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: run-{{ .Values.nfs.provisioner.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nfs.provisioner.name }}
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.nfs.provisioner.name }}-runner
  apiGroup: rbac.authorization.k8s.io

---
# ─── Role (namespace-scoped for leader election) ─────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-locking-{{ .Values.nfs.provisioner.name }}
  namespace: {{ .Values.namespace.name }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
# ─── RoleBinding ──────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-locking-{{ .Values.nfs.provisioner.name }}
  namespace: {{ .Values.namespace.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.nfs.provisioner.name }}
    namespace: {{ .Values.namespace.name }}
roleRef:
  kind: Role
  name: leader-locking-{{ .Values.nfs.provisioner.name }}
  apiGroup: rbac.authorization.k8s.io

{{- end }}
