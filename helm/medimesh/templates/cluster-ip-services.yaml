# ════════════════════════════════════════════════════════════
# MediMesh — All ClusterIP Services (Internal Communication)
# ════════════════════════════════════════════════════════════
# These services enable internal DNS-based communication
# between microservices within the medimesh namespace.
# Frontend service is in frontend-deployment.yaml
# MongoDB headless service is in mongodb-statefulset.yaml
# ════════════════════════════════════════════════════════════

{{- range $key, $svc := .Values.backendServices }}
---
# ─── {{ $svc.name | title }} Service (ClusterIP) ─────────
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.serviceName }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $svc.name }}
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: {{ $svc.name }}
    tier: backend
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
      name: http
{{- end }}

---
# ─── BFF Service (ClusterIP) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.bff.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.bff.name }}
    tier: backend
spec:
  type: {{ .Values.bff.service.type }}
  selector:
    app: {{ .Values.bff.name }}
    tier: backend
  ports:
    - port: {{ .Values.bff.service.port }}
      targetPort: {{ .Values.bff.service.targetPort }}
      protocol: TCP
      name: http
