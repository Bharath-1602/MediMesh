# ════════════════════════════════════════════════════════════
# MediMesh — Kubernetes Namespace
# ════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.namespace.labels.app }}
    project: {{ .Values.namespace.labels.project }}
    environment: {{ .Values.namespace.labels.environment }}
