
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongodb.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.mongodb.name }}
    tier: database
spec:
  clusterIP: None
  selector:
    app: {{ .Values.mongodb.name }}
    tier: database
  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.service.targetPort }}
      name: mongo

---
# ─── StatefulSet (3-Member ReplicaSet) ────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongodb.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.mongodb.name }}
    tier: database
spec:
  serviceName: {{ .Values.mongodb.name }}
  replicas: {{ .Values.mongodb.replicas }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: {{ .Values.mongodb.name }}
      tier: database
  template:
    metadata:
      labels:
        app: {{ .Values.mongodb.name }}
        tier: database
    spec:
      # ─── Spread pods across nodes for HA ──────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - {{ .Values.mongodb.name }}
                topologyKey: kubernetes.io/hostname

      # ─── Allow scheduling on master node if needed ────────
      {{- if .Values.mongodb.tolerations }}
      tolerations:
        {{- toYaml .Values.mongodb.tolerations | nindent 8 }}
      {{- end }}

      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mongodb.containerPort }}
              name: mongo
          # ─── Start mongod with ReplicaSet enabled ──────────
          command:
            - mongod
            - "--replSet"
            - {{ .Values.mongodb.replicaSetName | quote }}
            - "--bind_ip_all"
          # ─── Environment (for diagnostics) ──────────────────
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          # ─── Health Probes ─────────────────────────────────
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --quiet --eval "
                    try {
                      var status = rs.status();
                      var me = status.members.filter(m => m.self)[0];
                      if (me.stateStr === 'PRIMARY' || me.stateStr === 'SECONDARY') {
                        quit(0);
                      }
                      quit(1);
                    } catch(e) {
                      // rs not yet initiated — still pass basic ping
                      db.adminCommand('ping');
                    }
                  "
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: {{ .Values.mongodb.resources.requests.memory | quote }}
              cpu: {{ .Values.mongodb.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.mongodb.resources.limits.memory | quote }}
              cpu: {{ .Values.mongodb.resources.limits.cpu | quote }}

  # ─── VolumeClaimTemplates (NFS-backed PVC per pod) ───────
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.mongodb.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.mongodb.storage.size }}
