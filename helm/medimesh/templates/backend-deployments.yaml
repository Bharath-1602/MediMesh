# ════════════════════════════════════════════════════════════
# MediMesh — Backend Microservice Deployments
# ════════════════════════════════════════════════════════════
# Generates a Deployment for each backend service defined
# in .Values.backendServices using a range loop.
# ════════════════════════════════════════════════════════════
{{- range $key, $svc := .Values.backendServices }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.namespace.name }}
  labels:
    app: {{ $svc.name }}
    tier: backend
spec:
  replicas: {{ $.Values.backendDefaults.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
      tier: backend
  strategy:
    type: {{ $.Values.backendDefaults.strategy.type }}
    rollingUpdate:
      maxUnavailable: {{ $.Values.backendDefaults.strategy.maxUnavailable }}
      maxSurge: {{ $.Values.backendDefaults.strategy.maxSurge }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        tier: backend
    spec:
      # ─── Wait for MongoDB ReplicaSet PRIMARY ──────────────
      initContainers:
        - name: wait-for-mongodb-primary
          image: {{ $.Values.backendDefaults.initContainer.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB ReplicaSet to be ready..."
              until nc -z {{ $.Values.mongodb.name }}-0.{{ $.Values.mongodb.name }} {{ $.Values.mongodb.containerPort }}; do
                echo "{{ $.Values.mongodb.name }}-0 not ready, retrying in 3s..."
                sleep 3
              done
              echo "MongoDB ReplicaSet is reachable!"
      containers:
        - name: {{ $svc.name }}
          image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.backendDefaults.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: PORT
              value: {{ $svc.port | quote }}
            - name: MONGO_URI
              value: "mongodb://{{ $.Values.mongodb.name }}-0.{{ $.Values.mongodb.name }}:{{ $.Values.mongodb.containerPort }},{{ $.Values.mongodb.name }}-1.{{ $.Values.mongodb.name }}:{{ $.Values.mongodb.containerPort }},{{ $.Values.mongodb.name }}-2.{{ $.Values.mongodb.name }}:{{ $.Values.mongodb.containerPort }}/{{ $svc.dbName }}?replicaSet={{ $.Values.mongodb.replicaSetName }}"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: NODE_ENV
            {{- if $svc.extraEnv }}
            {{- toYaml $svc.extraEnv | nindent 12 }}
            {{- end }}
          # ─── Health Probes ──────────────────────────────────
          readinessProbe:
            httpGet:
              path: {{ $.Values.backendDefaults.readinessProbe.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.backendDefaults.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backendDefaults.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.backendDefaults.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.backendDefaults.livenessProbe.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.backendDefaults.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backendDefaults.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.backendDefaults.livenessProbe.timeoutSeconds }}
          resources:
            requests:
              cpu: {{ $.Values.backendDefaults.resources.requests.cpu | quote }}
              memory: {{ $.Values.backendDefaults.resources.requests.memory | quote }}
            limits:
              cpu: {{ $.Values.backendDefaults.resources.limits.cpu | quote }}
              memory: {{ $.Values.backendDefaults.resources.limits.memory | quote }}
{{- end }}
