# ════════════════════════════════════════════════════════════
# MediMesh — Secrets (Sensitive Configuration)
# ════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: medimesh-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    app: medimesh
    tier: config
type: Opaque
data:
  # ─── JWT ────────────────────────────────────────────────
  JWT_SECRET: {{ .Values.secrets.jwtSecret }}

  # ─── Admin Credentials ─────────────────────────────────
  ADMIN_USERNAME: {{ .Values.secrets.adminUsername }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword }}

  # ─── MongoDB Credentials ───────────────────────────────
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongoRootUsername }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword }}
